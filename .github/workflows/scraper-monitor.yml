name: Scraper Monitor

on:
  schedule:
    - cron: "0 3 * * *" # Run daily at 03:00 UTC
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      issues: write # Required to create issues automatically

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium with dependencies
        run: npx playwright install chromium --with-deps

      - name: Run Scraper Check
        run: |
          # Runs a quick search for "iphone" to verify that selector extraction works.
          # Limit to 1 to reduce traffic and avoid triggering bot protection.
          npx ts-node src/index.ts search -q "iphone" --limit 1 --non-interactive

      - name: Create Issue on Failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const issueTitle = '🚨 Scraper Failure Detected (Potential DOM/Selector Change)';
            const issueBody = `The scheduled scraper run failed on **${new Date().toUTCString()}**.

            This failure might indicate that Willhaben has changed its DOM structure/selectors or has started blocking the GitHub Actions runner IP.

            [View Workflow Run details](${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID})`;

            // Search if there is already an open issue with the same title to avoid duplicates
            const { data: openIssues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              creator: 'github-actions[bot]'
            });

            const alreadyOpen = openIssues.some(issue => issue.title === issueTitle);

            if (!alreadyOpen) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: issueTitle,
                body: issueBody,
                labels: ['bug', 'scraper-health']
              });
            } else {
              console.log('An issue for this failure is already open. Skipping creation.');
            }
